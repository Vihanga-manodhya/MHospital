<div class="reg-container">
  <h2>Hospital Login</h2>
  <div class="form-group">
    <label>Email</label>
    <input type="email" [(ngModel)]="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" [(ngModel)]="password">
  </div>
  <button (click)="onLogin()">Login</button>
</div>
