<div class="reg-container">
  <h2>Patient Registration</h2>
  
  <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" formControlName="fullName" placeholder="Enter Name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="Email Address">
      <small *ngIf="registrationForm.get('email')?.invalid && registrationForm.get('email')?.touched" class="error">
        Please enter a valid email.
      </small>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password" placeholder="Min 6 characters">
    </div>

    <button type="submit" [disabled]="registrationForm.invalid">Register Patient</button>
  </form>
</div>
