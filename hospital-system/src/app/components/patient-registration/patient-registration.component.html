<div class="reg-container">
  <h2>Patient Registration</h2>
  
  <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" formControlName="fullName" placeholder="Ex: Kamal Perera">
    </div>

    <div class="form-group">
      <label>NIC (National Identity Card)</label>
      <input type="text" formControlName="nic" placeholder="Ex: 199512345678 or 951234567V">
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" formControlName="phone" placeholder="Ex: 0712345678">
    </div>

    <div class="form-group">
      <label>Address</label>
      <textarea formControlName="address" placeholder="Enter patient address"></textarea>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" formControlName="email" placeholder="Ex: patient@mail.com">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password" placeholder="Create a password">
    </div>

    <button type="submit" [disabled]="registrationForm.invalid" class="reg-btn">
      Register Patient
    </button>
  </form>

  <p *ngIf="isSuccess" class="success-msg">Patient successfully added to the system!</p>
</div>
