<div style="padding: 20px; max-width: 500px; margin: auto; font-family: Arial;">
  <h2>Patient Registration (Computer Operator)</h2>
  
  <form (ngSubmit)="onSubmit()" #regForm="ngForm">
    <div style="margin-bottom: 10px;">
      <label>Patient Name:</label><br>
      <input type="text" [(ngModel)]="patient.name" name="name" required style="width: 100%; padding: 8px;">
    </div>
    
    <div style="margin-bottom: 10px;">
      <label>NIC Number:</label><br>
      <input type="text" [(ngModel)]="patient.nic" name="nic" required style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 10px;">
      <label>Age:</label><br>
      <input type="number" [(ngModel)]="patient.age" name="age" required style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 10px;">
      <label>Symptom / Illness (රෝග ලක්ෂණ):</label><br>
      <input type="text" [(ngModel)]="patient.illness" name="illness" required style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 20px;">
      <label>Assign to Doctor:</label><br>
      <select [(ngModel)]="patient.assignedDoctor" name="assignedDoctor" required style="width: 100%; padding: 8px;">
        <option value="" disabled>Select Doctor</option>
        <option value="Skin Doctor">Skin Doctor (Dermatologist)</option>
        <option value="General Physician">General Physician (OPD)</option>
        <option value="Eye Doctor">Eye Doctor</option>
      </select>
    </div>

    <button type="submit" [disabled]="!regForm.valid" style="padding: 10px 20px; background-color: blue; color: white; border: none; cursor: pointer;">
      Register Patient
    </button>
  </form>

  <div *ngIf="generatedHospitalId" style="margin-top: 20px; padding: 15px; border: 2px solid green; background-color: #e8ffe8;">
    <h3 style="color: green;">Registration Successful!</h3>
    <p><strong>Hospital ID:</strong> {{ generatedHospitalId }}</p>
    <p><em>(Use this ID for Barcode generation)</em></p>
  </div>
</div>
